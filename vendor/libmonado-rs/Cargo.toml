[package]
name = "libmonado"
description = "Rust bindings to the libmonado library that controls Monado from other processes"
license = "MIT"
repository = "https://github.com/technobaboo/libmonado-rs"
readme = "README.md"
# Monadeck fork: vendored + patched to expose the controller-freeze binding
# (mnd_root_set_client_controller_freeze) the Monado fork adds at .so API 1.8.
# Redirected here via a workspace [patch] in monadeck/Cargo.toml (upstream rev
# 6f66b26). Keep this version equal to the upstream crate's (1.6.0) so the [patch]
# replaces it cleanly — the added symbol is optional, so this stays a drop-in.
version = "1.6.0"
edition = "2021"

[dependencies]
dlopen2 = "0.7.0"
flagset = "0.4.4"
mint = "0.5.9"
semver = "1.0.18"

serde = { version = "1.0.204", features = ["derive"] }
serde_json = "1.0.120"
xdg = "2.5.2"

[target.'cfg(unix)'.dependencies]
libc = "0.2.168"

[dev-dependencies]
clap = { version = "4.4.3", features = ["derive"] }
color = "0.2.2"

[features]
default = []
arc = []
rc = []
